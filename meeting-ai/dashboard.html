<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會議 AI 助理 · Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    /* ── 基礎重設 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f0f;
      --bg-card:     #1a1a1a;
      --bg-header:   #111111;
      --border:      #2a2a2a;
      --text:        #e0e0e0;
      --text-muted:  #6b6b6b;
      --text-ts:     #4a9eff;
      --green:       #22c55e;
      --green-dim:   #15803d20;
      --red:         #ef4444;
      --red-dim:     #7f1d1d20;
      --purple:      #a855f7;
      --purple-dim:  #4c1d9520;
      --accent:      #3b82f6;
      --accent-dim:  #1e3a5f;
      --status-ok:   #22c55e;
      --status-idle: #6b7280;
      --radius:      8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── 整體佈局 ── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 頂部標頭 ── */
    header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .header-spacer { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .btn-outline {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }
    .btn-ghost:hover { color: var(--text); }

    /* ── 主要雙欄 ── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .badge {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--accent-dim);
      color: var(--accent);
    }

    .panel-spacer { flex: 1; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scroll-behavior: smooth;
    }

    /* ── 逐字稿條目 ── */
    .transcript-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1e1e1e;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ts-time {
      font-size: 11px;
      color: var(--text-ts);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      margin-top: 2px;
      font-family: 'Consolas', monospace;
    }

    .ts-text {
      color: var(--text);
      flex: 1;
    }

    .ts-lang {
      font-size: 10px;
      color: var(--text-muted);
      align-self: flex-start;
      margin-top: 3px;
    }

    /* ── AI 分析面板 ── */
    .analysis-section {
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .label-summary  { color: var(--green); }
    .label-question { color: var(--red); }
    .label-action   { color: var(--purple); }

    .analysis-list { list-style: none; }

    .analysis-list li {
      padding: 6px 10px;
      border-radius: 5px;
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }

    .analysis-list li::before { content: '·'; flex-shrink: 0; }

    .list-summary  { background: var(--green-dim); color: #86efac; }
    .list-summary::before { color: var(--green); }

    .list-question { background: var(--red-dim);   color: #fca5a5; }
    .list-question::before { color: var(--red); }

    .list-action   { background: var(--purple-dim); color: #d8b4fe; }
    .list-action::before { color: var(--purple); }

    .empty-hint {
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
      padding: 4px 10px;
    }

    .analysis-ts {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
    }

    /* ── 分析中 loading ── */
    .analyzing-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px;
      color: var(--accent);
      font-size: 13px;
    }
    .analyzing-indicator.visible { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 狀態列 ── */
    footer {
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--status-idle);
      flex-shrink: 0;
    }
    .status-dot.recording {
      background: var(--status-ok);
      box-shadow: 0 0 6px var(--status-ok);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text { color: var(--text); }
    .footer-spacer { flex: 1; }

    .conn-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .conn-badge.connected    { color: var(--green);  border-color: var(--green); }
    .conn-badge.disconnected { color: var(--red);    border-color: var(--red); }

    /* ── 捲動條美化 ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    /* ── Toast 通知 ── */
    .toast-container {
      position: fixed;
      bottom: 48px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .toast {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      max-width: 320px;
      animation: slideIn 0.2s ease;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── 頂部標頭 ── -->
  <header>
    <h1>會議 <span>AI</span> 助理</h1>
    <div class="header-spacer"></div>
    <button class="btn btn-primary" id="btn-analyze" onclick="triggerAnalyze()">
      ⚡ 立即分析
    </button>
  </header>

  <!-- ── 主要雙欄 ── -->
  <main>

    <!-- 左欄：逐字稿 -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">即時逐字稿</span>
        <span class="badge" id="transcript-count">0 條</span>
        <div class="panel-spacer"></div>
        <button class="btn btn-ghost" onclick="clearTranscript()" title="清除逐字稿">✕</button>
      </div>
      <div class="panel-body" id="transcript-body">
        <div class="empty-hint" id="transcript-empty">等待錄音開始...</div>
      </div>
    </div>

    <!-- 右欄：AI 分析 -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">AI 分析</span>
        <div class="panel-spacer"></div>
        <button class="btn btn-outline" id="btn-export" onclick="exportMinutes()">
          📄 匯出會議紀錄
        </button>
      </div>
      <div class="panel-body" id="analysis-body">

        <div class="analyzing-indicator" id="analyzing-indicator">
          <div class="spinner"></div>
          <span>AI 分析中...</span>
        </div>

        <!-- 摘要 -->
        <div class="analysis-section">
          <div class="section-label label-summary">重點摘要</div>
          <ul class="analysis-list" id="summary-list">
            <li class="list-summary empty-hint">等待 AI 分析...</li>
          </ul>
        </div>

        <!-- 待釐清問題 -->
        <div class="analysis-section">
          <div class="section-label label-question">待釐清問題</div>
          <ul class="analysis-list" id="questions-list">
            <li class="list-question empty-hint">—</li>
          </ul>
        </div>

        <!-- 行動項目 -->
        <div class="analysis-section">
          <div class="section-label label-action">行動項目</div>
          <ul class="analysis-list" id="actions-list">
            <li class="list-action empty-hint">—</li>
          </ul>
        </div>

        <div class="analysis-ts" id="analysis-ts"></div>
      </div>
    </div>

  </main>

  <!-- ── 狀態列 ── -->
  <footer>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">未連線</span>
    <span id="duration-text"></span>
    <div class="footer-spacer"></div>
    <span class="conn-badge disconnected" id="conn-badge">● 未連線</span>
  </footer>

</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<script>
  // ── Socket.IO 連線 ────────────────────────────────
  const socket = io({ transports: ['websocket', 'polling'] });

  let transcriptCount = 0;
  let isRecording = false;
  let durationSeconds = 0;
  let durationTimer = null;

  // 連線成功
  socket.on('connect', () => {
    document.getElementById('conn-badge').textContent = '● 已連線';
    document.getElementById('conn-badge').className = 'conn-badge connected';
    showToast('已連線至後端伺服器', 'success');
  });

  // 連線中斷
  socket.on('disconnect', () => {
    document.getElementById('conn-badge').textContent = '● 未連線';
    document.getElementById('conn-badge').className = 'conn-badge disconnected';
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = '連線中斷';
    showToast('與後端連線中斷，嘗試重連...', 'error');
  });

  // 收到新逐字稿
  socket.on('new_transcript', (data) => {
    appendTranscript(data);
  });

  // 收到 AI 分析結果
  socket.on('ai_analysis', (data) => {
    setAnalyzing(false);
    updateAnalysis(data);
  });

  // 錄音狀態更新
  socket.on('status_update', (data) => {
    isRecording = data.is_recording;
    durationSeconds = data.duration_seconds || 0;
    updateStatusBar();
  });

  // 匯出完成
  socket.on('export_done', (data) => {
    document.getElementById('btn-export').disabled = false;
    document.getElementById('btn-export').textContent = '📄 匯出會議紀錄';
    if (data.success) {
      showToast(`✅ 會議紀錄已匯出：${data.filepath}`, 'success');
    } else {
      showToast(`❌ 匯出失敗：${data.error}`, 'error');
    }
  });

  // ── 逐字稿操作 ──────────────────────────────────
  function appendTranscript(entry) {
    const empty = document.getElementById('transcript-empty');
    if (empty) empty.remove();

    const body = document.getElementById('transcript-body');
    const div = document.createElement('div');
    div.className = 'transcript-entry';
    div.innerHTML = `
      <span class="ts-time">${entry.timestamp}</span>
      <span class="ts-text">${escHtml(entry.text)}</span>
      <span class="ts-lang">${entry.language || ''}</span>
    `;
    body.appendChild(div);

    // 自動捲動到底部
    body.scrollTop = body.scrollHeight;

    transcriptCount++;
    document.getElementById('transcript-count').textContent = `${transcriptCount} 條`;
  }

  function clearTranscript() {
    const body = document.getElementById('transcript-body');
    body.innerHTML = '<div class="empty-hint" id="transcript-empty">已清除</div>';
    transcriptCount = 0;
    document.getElementById('transcript-count').textContent = '0 條';
  }

  // ── AI 分析操作 ──────────────────────────────────
  function updateAnalysis(data) {
    renderList('summary-list', data.summary || [], 'list-summary');
    renderList('questions-list', data.pending_questions || [], 'list-question');
    renderList('actions-list', data.action_items || [], 'list-action');

    if (data.timestamp) {
      document.getElementById('analysis-ts').textContent = `最後分析：${data.timestamp}`;
    }

    if (data.error) {
      showToast(`AI 分析錯誤：${data.error}`, 'error');
    }
  }

  function renderList(listId, items, cssClass) {
    const ul = document.getElementById(listId);
    ul.innerHTML = '';
    if (!items || items.length === 0) {
      ul.innerHTML = `<li class="${cssClass} empty-hint">—</li>`;
      return;
    }
    items.forEach(item => {
      const li = document.createElement('li');
      li.className = cssClass;
      li.innerHTML = `<span>${escHtml(item)}</span>`;
      ul.appendChild(li);
    });
  }

  function setAnalyzing(on) {
    const ind = document.getElementById('analyzing-indicator');
    if (on) {
      ind.classList.add('visible');
    } else {
      ind.classList.remove('visible');
    }
    document.getElementById('btn-analyze').disabled = on;
    document.getElementById('btn-analyze').textContent = on ? '分析中...' : '⚡ 立即分析';
  }

  // ── 按鈕事件 ─────────────────────────────────────
  function triggerAnalyze() {
    setAnalyzing(true);
    fetch('/api/analyze', { method: 'POST' })
      .then(r => r.json())
      .then(d => showToast(d.message, 'info'))
      .catch(e => {
        setAnalyzing(false);
        showToast(`錯誤：${e.message}`, 'error');
      });
  }

  function exportMinutes() {
    const btn = document.getElementById('btn-export');
    btn.disabled = true;
    btn.textContent = '匯出中...';
    showToast('正在產生會議紀錄，請稍候...', 'info');
    fetch('/export', { method: 'POST' })
      .then(r => r.json())
      .catch(e => {
        btn.disabled = false;
        btn.textContent = '📄 匯出會議紀錄';
        showToast(`錯誤：${e.message}`, 'error');
      });
  }

  // ── 狀態列 ───────────────────────────────────────
  function updateStatusBar() {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const dur = document.getElementById('duration-text');

    if (isRecording) {
      dot.className = 'status-dot recording';
      text.textContent = '錄音中';
    } else {
      dot.className = 'status-dot';
      text.textContent = '待機中';
    }

    if (durationSeconds > 0) {
      dur.textContent = `已錄音 ${formatDuration(durationSeconds)}`;
    } else {
      dur.textContent = '';
    }
  }

  function formatDuration(secs) {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
    return `${pad(m)}:${pad(s)}`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  // ── Toast 通知 ────────────────────────────────────
  function showToast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  // ── 工具函式 ──────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
